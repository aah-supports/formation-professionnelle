<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Python Niveau III - Jour 1</title>
<style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f6fa;color:#2d3436;margin:0;padding:0 0 40px}
.container{max-width:820px;margin:0 auto;padding:20px}.question{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:14px;border-left:4px solid #74b9ff}
.question.correct{border-left-color:#00b894}.question.wrong{border-left-color:#d63031}.q{font-weight:600;margin-bottom:10px}
.choice{display:block;margin:6px 0}.actions{text-align:center;margin:24px 0}button{background:#0984e3;color:#fff;border:none;padding:12px 22px;border-radius:8px;cursor:pointer}
#results{display:none;background:#fff;padding:20px;border-radius:10px}.ok{color:#00b894}.ko{color:#d63031}
a{color:#0984e3;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <p><a href="index.html">&larr; Retour quiz Python Niveau III</a></p>
  <h1>Quiz Python Niveau III - Jour 1</h1>
  <p>NumPy et pandas fondamentaux. 10 questions - repere >= 6/10.</p>
  <div id="quiz"></div>
  <div class="actions"><button id="submit" onclick="grade()">Valider</button></div>
  <div id="results"></div>
</div>
<script>
const QUESTIONS=[
{id:1,q:"NumPy est principalement utilise pour :",c:{a:"Le rendu web",b:"Le calcul numerique vectorise",c:"Le reseau",d:"Les migrations SQL"},a:"b"},
{id:2,q:"La propriete shape d'un array renvoie :",c:{a:"Le type de variable",b:"Un tuple de dimensions",c:"La taille en octets",d:"Le nom de l'array"},a:"b"},
{id:3,q:"Pourquoi la vectorisation est utile ?",c:{a:"Elle evite les boucles Python explicites",b:"Elle supprime les imports",c:"Elle remplace les tests",d:"Elle fait du multithread automatiquement"},a:"a"},
{id:4,q:"Un masque booleen NumPy sert a :",c:{a:"Crypter les donnees",b:"Filtrer des elements selon une condition",c:"Changer le dtype",d:"Lire un CSV"},a:"b"},
{id:5,q:"np.mean(x, axis=0) calcule :",c:{a:"La moyenne globale",b:"La moyenne colonne par colonne",c:"La moyenne ligne par ligne",d:"Toujours la mediane"},a:"b"},
{id:6,q:"pandas.read_csv(...) sert a :",c:{a:"Exporter en PDF",b:"Lire un fichier CSV en DataFrame",c:"Creer un graphique 3D",d:"Compiler un notebook"},a:"b"},
{id:7,q:"Dans pandas, df.head() affiche :",c:{a:"Les 5 premieres lignes par defaut",b:"Le schema SQL",c:"Les 5 dernieres lignes",d:"La taille memoire"},a:"a"},
{id:8,q:"Quel attribut indique les types de colonnes d'un DataFrame ?",c:{a:"df.names",b:"df.types",c:"df.dtypes",d:"df.schema"},a:"c"},
{id:9,q:"dropna() sans argument supprime :",c:{a:"Les doublons",b:"Les lignes contenant au moins un NA",c:"Toutes les colonnes numeriques",d:"Le tri"},a:"b"},
{id:10,q:"fillna(0) permet de :",c:{a:"Remplacer les valeurs manquantes par 0",b:"Supprimer les lignes vides",c:"Convertir en texte",d:"Fusionner deux tables"},a:"a"}
];
function render(){const root=document.getElementById('quiz');root.innerHTML=QUESTIONS.map(x=>`<div class="question" id="q${x.id}"><div class="q">${x.id}. ${x.q}</div>${Object.entries(x.c).map(([k,v])=>`<label class="choice"><input type="radio" name="q${x.id}" value="${k}"> ${k}) ${v}</label>`).join('')}</div>`).join('');}
function grade(){let s=0;QUESTIONS.forEach(x=>{const el=document.getElementById('q'+x.id);const checked=document.querySelector(`input[name="q${x.id}"]:checked`);if(checked&&checked.value===x.a){s++;el.classList.add('correct');}else{el.classList.add('wrong');}el.querySelectorAll('input').forEach(i=>i.disabled=true);});const pass=s>=6;const r=document.getElementById('results');r.style.display='block';r.innerHTML=`<h2>Score: ${s}/10</h2><p class="${pass?'ok':'ko'}">${pass?'Positionnement favorable':'A renforcer'}</p>`;document.getElementById('submit').disabled=true;}
render();
</script>
</body>
</html>
