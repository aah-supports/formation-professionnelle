<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Python Niveau III - Jour 2</title>
<style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f6fa;color:#2d3436;margin:0;padding:0 0 40px}.container{max-width:820px;margin:0 auto;padding:20px}.question{background:#fff;border-radius:10px;padding:16px 18px;margin-bottom:12px;border-left:4px solid #f39c12}.question.correct{border-left-color:#00b894}.question.wrong{border-left-color:#d63031}.choice{display:block;margin:6px 0}button{background:#0984e3;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer}#res{display:none;background:#fff;padding:16px;border-radius:10px;margin-top:16px}</style>
</head>
<body>
<div class="container">
<p><a href="index.html">&larr; Retour quiz Python Niveau III</a></p>
<h1>Quiz Python Niveau III - Jour 2</h1>
<div id="quiz"></div>
<button id="btn" onclick="grade()">Valider</button>
<div id="res"></div>
</div>
<script>
const Q=[
{id:1,q:"pandas.merge sert principalement a :",c:{a:"Fusionner des tables",b:"Tracer un graphe",c:"Creer une API",d:"Compresser un fichier"},a:"a"},
{id:2,q:"pivot_table permet de :",c:{a:"Faire une aggregation croisee",b:"Changer le type en int",c:"Lire un Excel",d:"Executer du SQL"},a:"a"},
{id:3,q:"Pour une serie temporelle, resample('M') sert a :",c:{a:"Reechantillonner mensuellement",b:"Trier alphabetiquement",c:"Supprimer les NA",d:"Joindre deux DataFrames"},a:"a"},
{id:4,q:"groupby(...).agg(...) sert a :",c:{a:"Agreger par groupe",b:"Creer un index unique",c:"Convertir en NumPy",d:"Compter les colonnes seulement"},a:"a"},
{id:5,q:"Pour exporter un DataFrame en CSV :",c:{a:"df.write_csv()",b:"df.to_csv()",c:"df.export()",d:"df.csv()"},a:"b"}
];
function render(){document.getElementById('quiz').innerHTML=Q.map(x=>`<div class='question' id='q${x.id}'><p><strong>${x.id}. ${x.q}</strong></p>${Object.entries(x.c).map(([k,v])=>`<label class='choice'><input type='radio' name='q${x.id}' value='${k}'> ${k}) ${v}</label>`).join('')}</div>`).join('');}
function grade(){let s=0;Q.forEach(x=>{const el=document.getElementById('q'+x.id);const ch=document.querySelector(`input[name="q${x.id}"]:checked`);if(ch&&ch.value===x.a){s++;el.classList.add('correct')}else{el.classList.add('wrong')}el.querySelectorAll('input').forEach(i=>i.disabled=true)});const r=document.getElementById('res');r.style.display='block';r.innerHTML=`<h2>Score: ${s}/5</h2>`;document.getElementById('btn').disabled=true;}
render();
</script>
</body>
</html>
