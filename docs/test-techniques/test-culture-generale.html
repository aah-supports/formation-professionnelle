<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test 1 - Culture générale</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f5f6fa;color:#2d3436;line-height:1.6;margin:0}
.container{max-width:980px;margin:0 auto;padding:26px 18px 48px}
.header-bar{background:#0984e3;color:#fff;padding:12px 18px;border-radius:10px;margin-bottom:18px;font-size:.9rem}
.header-bar strong{color:#fff}
h1{font-size:1.7rem;margin:0 0 8px 0}
.subtitle{color:#636e72;margin-bottom:18px}
.panel{background:#fff;border:1px solid #dfe6e9;border-radius:12px;padding:18px;margin-bottom:16px}
.q-item{padding:12px;border:1px solid #e8ebef;border-radius:10px;margin:10px 0;background:#fbfcfd}
.q-item p{margin:0 0 8px 0;font-weight:600}
.options label{display:block;margin:6px 0}
button{border:none;border-radius:8px;padding:10px 14px;background:#0984e3;color:#fff;font-weight:600;cursor:pointer}
.result{margin-top:10px;padding:10px 12px;border-radius:8px;background:#f1f2f6}
.ok{color:#00b894;font-weight:700}
.ko{color:#d63031;font-weight:700}
.pending{color:#636e72;font-weight:700}
.back{margin-bottom:10px}
.back a{text-decoration:none;color:#0984e3;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <div class="header-bar"><strong>Test technique</strong></div>
  <p class="back"><a href="index.html">← Retour aux tests</a></p>
  <h1>Test 1 - Culture générale informatique</h1>
  <p class="subtitle">30 questions QCM (choix de réponses uniquement).</p>

  <section class="panel">
    <h2>Questions</h2>
    <form id="questions"></form>
    <button type="button" id="grade-btn">Corriger ce thème</button>
    <div id="result" class="result" aria-live="polite">Aucune correction lancée.</div>
    <div id="decision" class="result" aria-live="polite">Décision globale RDV en attente des autres tests.</div>
  </section>
</div>

<script>
const CONFIG = {
  themeKey: 'culture',
  dataFile: './data/culture-generale-jauges.json'
};
const STORE_KEY = 'testTechScoresV3';
const requiredForRdv = ['culture', 'motivation', 'pseudo'];
const thresholds = { culture: 60, motivation: 60, pseudo: 60 };

let payload = null;
let locked = false;

function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch (err) { return {}; }
}
function saveStore(store) { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }

function globalScoreRdv(store) {
  const score = requiredForRdv.reduce((acc, k) => acc + Number((store[k] && store[k].score) || 0), 0);
  const maxTotal = requiredForRdv.reduce((acc, k) => {
    const max = store[k] && typeof store[k].max === 'number' ? store[k].max : 30;
    return acc + Number(max || 0);
  }, 0);
  const completedThemes = requiredForRdv.filter((k) => store[k] && store[k].completed).length;
  const percent = maxTotal ? (score / maxTotal) * 100 : 0;
  return { score, maxTotal, percent, completedThemes, totalThemes: requiredForRdv.length };
}

function computeDecision(store) {
  const missing = requiredForRdv.filter((k) => !store[k] || !store[k].completed);
  if (missing.length) return { status: 'incomplete', missing };
  const failed = requiredForRdv.filter((k) => (store[k].percent || 0) < thresholds[k]);
  if (failed.length) return { status: 'no', failed };
  return { status: 'yes' };
}

function renderDecision() {
  const store = loadStore();
  const d = computeDecision(store);
  const global = globalScoreRdv(store);
  const box = document.getElementById('decision');
  if (d.status === 'incomplete') {
    box.innerHTML = `<span class="pending">Décision RDV : en attente</span><br><small>Tests 1-2-3 manquants/incomplets : ${d.missing.join(', ')}. Score global actuel : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%), tests terminés : ${global.completedThemes}/${global.totalThemes}.</small>`;
    return;
  }
  if (d.status === 'no') {
    box.innerHTML = `<span class="ko">Décision RDV : NON</span><br><small>Thèmes sous le seuil : ${d.failed.join(', ')}. Score global : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%).</small>`;
    return;
  }
  box.innerHTML = `<span class="ok">Décision RDV : OUI</span><br><small>Profil cohérent pour proposer un rendez-vous. Score global : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%).</small>`;
}

function getThemeData() {
  const store = loadStore();
  return store[CONFIG.themeKey] || { answers: {}, score: 0, max: 0, percent: 0, completed: false };
}

function evaluateAnswers(answers) {
  const total = payload.questions.length;
  let answered = 0;
  let correct = 0;

  payload.questions.forEach((q) => {
    if (!Object.prototype.hasOwnProperty.call(answers, q.id)) return;
    answered += 1;
    if (Number(answers[q.id]) === Number(q.answer)) correct += 1;
  });

  const completed = answered === total;
  const percent = total ? (correct / total) * 100 : 0;
  return { total, answered, correct, completed, percent };
}

function saveThemeFromAnswers(answers) {
  const evaluation = evaluateAnswers(answers);
  const store = loadStore();
  store[CONFIG.themeKey] = {
    answers,
    score: evaluation.correct,
    max: evaluation.total,
    percent: evaluation.percent,
    completed: evaluation.completed,
    updatedAt: new Date().toISOString()
  };
  saveStore(store);
  return evaluation;
}

function lockTheme() {
  locked = true;
  document.querySelectorAll('#questions input').forEach((input) => { input.disabled = true; });
  const gradeBtn = document.getElementById('grade-btn');
  gradeBtn.disabled = true;
  gradeBtn.textContent = 'Test finalisé';
}

function renderResult(evaluation) {
  const box = document.getElementById('result');

  if (!evaluation.completed) {
    box.innerHTML = `<span class="pending">Progression enregistrée.</span><br><small>${evaluation.answered}/${evaluation.total} réponses. Score actuel : ${evaluation.correct}/${evaluation.total} (${evaluation.percent.toFixed(1)}%).</small>`;
    return;
  }

  if (evaluation.percent >= 60) {
    box.innerHTML = `<span class="ok">Thème finalisé et validé.</span><br><small>Score : ${evaluation.correct}/${evaluation.total} (${evaluation.percent.toFixed(1)}%).</small>`;
  } else {
    box.innerHTML = `<span class="ko">Thème finalisé (sous seuil).</span><br><small>Score : ${evaluation.correct}/${evaluation.total} (${evaluation.percent.toFixed(1)}%).</small>`;
  }
}

function renderQuestions() {
  const form = document.getElementById('questions');
  form.innerHTML = '';
  const theme = getThemeData();
  const answers = theme.answers || {};

  payload.questions.forEach((q, idx) => {
    const item = document.createElement('div');
    item.className = 'q-item';

    const options = q.options.map((opt, optIdx) =>
      `<label><input type="radio" name="${q.id}" value="${optIdx}"${Number(answers[q.id]) === optIdx ? ' checked' : ''}> ${opt}</label>`
    ).join('');

    item.innerHTML = `<p>${idx + 1}) ${q.question}</p><div class="options">${options}</div>`;
    form.appendChild(item);
  });

  const evaluation = saveThemeFromAnswers(answers);
  renderResult(evaluation);
  if (evaluation.completed) lockTheme();
  renderDecision();
}

function gradeTheme() {
  const theme = getThemeData();
  const evaluation = saveThemeFromAnswers(theme.answers || {});
  renderResult(evaluation);
  if (evaluation.completed) lockTheme();
  renderDecision();
}

function handleChoiceChange(event) {
  if (locked) return;
  const target = event.target;
  if (!target || target.type !== 'radio') return;

  const theme = getThemeData();
  const answers = { ...(theme.answers || {}) };
  answers[target.name] = Number(target.value);

  const evaluation = saveThemeFromAnswers(answers);
  renderResult(evaluation);
  if (evaluation.completed) lockTheme();
  renderDecision();
}

async function init() {
  try {
    const res = await fetch(CONFIG.dataFile);
    payload = await res.json();
    renderQuestions();
    document.getElementById('questions').addEventListener('change', handleChoiceChange);
  } catch (err) {
    document.getElementById('result').innerHTML = `<span class="ko">Erreur de chargement.</span><br><small>${String(err)}</small>`;
  }
}

document.getElementById('grade-btn').addEventListener('click', gradeTheme);
init();
</script>
</body>
</html>
