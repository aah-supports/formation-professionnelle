<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Python Niveau II - Jour 1</title>
<style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f6fa;color:#2d3436;margin:0;padding:0 0 40px}
.container{max-width:820px;margin:0 auto;padding:20px}.question{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:14px;border-left:4px solid #74b9ff}
.question.correct{border-left-color:#00b894}.question.wrong{border-left-color:#d63031}.q{font-weight:600;margin-bottom:10px}
.choice{display:block;margin:6px 0}.actions{text-align:center;margin:24px 0}button{background:#0984e3;color:#fff;border:none;padding:12px 22px;border-radius:8px;cursor:pointer}
#results{display:none;background:#fff;padding:20px;border-radius:10px}.ok{color:#00b894}.ko{color:#d63031}
a{color:#0984e3;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <p><a href="index.html">&larr; Retour quiz Python Niveau II</a></p>
  <h1>Quiz Python Niveau II - Jour 1</h1>
  <p>Objet, decorateurs et modelisation. 10 questions - repere >= 6/10.</p>
  <div id="quiz"></div>
  <div class="actions"><button id="submit" onclick="grade()">Valider</button></div>
  <div id="results"></div>
</div>
<script>
const QUESTIONS=[
{id:1,q:"Dans une methode d'instance, a quoi sert self ?",c:{a:"A referencer l'objet courant",b:"A cloner la classe",c:"A importer un module",d:"A definir un type"},a:"a"},
{id:2,q:"Quel est le role de __init__ ?",c:{a:"Detruire un objet",b:"Initialiser l'etat d'un objet",c:"Compiler le code",d:"Executer les tests"},a:"b"},
{id:3,q:"@dataclass sert surtout a :",c:{a:"Ajouter un event loop",b:"Generer automatiquement init/repr/eq",c:"Optimiser le CPU",d:"Creer une coroutine"},a:"b"},
{id:4,q:"Pourquoi utiliser @property ?",c:{a:"Pour exposer un attribut avec controle d'acces",b:"Pour lancer asyncio",c:"Pour heriter automatiquement",d:"Pour faire du multithread"},a:"a"},
{id:5,q:"Un decorateur de fonction retourne en general :",c:{a:"Un entier",b:"Une nouvelle fonction wrapper",c:"Un module",d:"Un thread"},a:"b"},
{id:6,q:"A quoi sert functools.wraps dans un decorateur ?",c:{a:"A supprimer la fonction originale",b:"A conserver metadata (nom, doc)",c:"A bloquer les exceptions",d:"A typer les variables"},a:"b"},
{id:7,q:"Dans une sous-classe, super() permet surtout de :",c:{a:"Appeler les membres de la classe parente",b:"Creer un singleton",c:"Executer en parallele",d:"Convertir en JSON"},a:"a"},
{id:8,q:"@classmethod recoit en premier argument :",c:{a:"self",b:"cls",c:"args",d:"kwargs"},a:"b"},
{id:9,q:"Quand preferer la composition a l'heritage ?",c:{a:"Quand on veut assembler des comportements reutilisables",b:"Quand il faut toujours une hierrarchie profonde",c:"Quand on evite les objets",d:"Jamais"},a:"a"},
{id:10,q:"Quel principe reduit le couplage dans une classe ?",c:{a:"Tout mettre en public",b:"Responsabilite unique",c:"Inheritance maximale",d:"Variables globales"},a:"b"}
];
function render(){const root=document.getElementById('quiz');root.innerHTML=QUESTIONS.map(x=>`<div class="question" id="q${x.id}"><div class="q">${x.id}. ${x.q}</div>${Object.entries(x.c).map(([k,v])=>`<label class="choice"><input type="radio" name="q${x.id}" value="${k}"> ${k}) ${v}</label>`).join('')}</div>`).join('');}
function grade(){let s=0;QUESTIONS.forEach(x=>{const el=document.getElementById('q'+x.id);const checked=document.querySelector(`input[name="q${x.id}"]:checked`);if(checked&&checked.value===x.a){s++;el.classList.add('correct');}else{el.classList.add('wrong');}el.querySelectorAll('input').forEach(i=>i.disabled=true);});const pass=s>=6;const r=document.getElementById('results');r.style.display='block';r.innerHTML=`<h2>Score: ${s}/10</h2><p class="${pass?'ok':'ko'}">${pass?'Positionnement favorable':'A renforcer'}</p>`;document.getElementById('submit').disabled=true;}
render();
</script>
</body>
</html>
