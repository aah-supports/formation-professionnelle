<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Python Niveau I - Jour 2</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f5f6fa;color:#2d3436;margin:0;padding:0 0 40px}
.container{max-width:860px;margin:0 auto;padding:20px}
.question{background:#fff;border-radius:10px;padding:16px 18px;margin-bottom:12px;border-left:4px solid #e17055}
.question.correct{border-left-color:#00b894}
.question.wrong{border-left-color:#d63031}
.choice{display:block;margin:6px 0}
button{background:#0984e3;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer}
#res{display:none;background:#fff;padding:16px;border-radius:10px;margin-top:16px}
</style>
</head>
<body>
<div class="container">
<p><a href="index.html">&larr; Retour quiz Python Niveau I</a></p>
<h1>Quiz Python Niveau I - Jour 2</h1>
<p>Thèmes: fichiers, modules, structuration, visualisation matplotlib, projet de synthèse.</p>
<div id="quiz"></div>
<button id="btn" onclick="grade()">Valider</button>
<div id="res"></div>
</div>
<script>
const Q = [
{id:1,q:"Quel module standard lit un CSV en Python pur ?",c:{a:"csv",b:"json",c:"pathlib",d:"math"},a:"a"},
{id:2,q:"Quel bloc garantit la fermeture d'un fichier ?",c:{a:"if",b:"with",c:"while",d:"match"},a:"b"},
{id:3,q:"Quel appel lit des lignes CSV sous forme de dictionnaires ?",c:{a:"csv.reader",b:"csv.DictReader",c:"json.loads",d:"open.dict"},a:"b"},
{id:4,q:"Le but principal d'un module Python est de :",c:{a:"Ralentir le code",b:"Organiser le code par responsabilité",c:"Masquer les erreurs",d:"Remplacer les fonctions"},a:"b"},
{id:5,q:"Dans un mini-projet, la fonction main sert à :",c:{a:"Dessiner des graphes",b:"Orchestrer les étapes principales",c:"Créer des classes automatiquement",d:"Installer les dépendances"},a:"b"},
{id:6,q:"Quelle exception lever pour une valeur métier invalide ?",c:{a:"TypeError",b:"KeyError",c:"ValueError",d:"ImportError"},a:"c"},
{id:7,q:"Quel principe améliore le plus la lisibilité ?",c:{a:"Fonctions courtes",b:"Variables d'une lettre",c:"Un seul bloc de 300 lignes",d:"Aucun commentaire"},a:"a"},
{id:8,q:"Quel format convient bien pour un rapport structuré ?",c:{a:".tmp",b:".json",c:".bak",d:".bin"},a:"b"},
{id:9,q:"Quelle fonction matplotlib trace des barres ?",c:{a:"plt.plot",b:"plt.hist",c:"plt.bar",d:"plt.scatter"},a:"c"},
{id:10,q:"Quelle fonction matplotlib trace un histogramme ?",c:{a:"plt.hist",b:"plt.box",c:"plt.grid",d:"plt.table"},a:"a"},
{id:11,q:"Quel appel exporte un graphique en PNG ?",c:{a:"plt.push",b:"plt.save",c:"plt.savefig",d:"plt.storefig"},a:"c"},
{id:12,q:"Pourquoi nommer les axes d'un graphique ?",c:{a:"Aucun intérêt",b:"Éviter les erreurs de lecture",c:"Accélérer Python",d:"Réduire la mémoire"},a:"b"},
{id:13,q:"Dans une agrégation Python pure, acc.get(cle, 0) sert à :",c:{a:"Lire le dossier courant",b:"Initialiser un cumul",c:"Trier une liste",d:"Convertir en int"},a:"b"},
{id:14,q:"Quel pattern évite les effets de bord sur une liste ?",c:{a:"Modifier en place sans contrôle",b:"Créer une copie avant modification",c:"Utiliser global partout",d:"Éviter les fonctions"},a:"b"},
{id:15,q:"Dans un script robuste, on traite en priorité :",c:{a:"Seulement le cas nominal",b:"Cas nominal + limites + erreurs",c:"Seulement les erreurs",d:"Seulement les performances"},a:"b"},
{id:16,q:"Quel est le meilleur ordre de traitement ?",c:{a:"Nettoyer puis lire",b:"Lire puis nettoyer puis agréger",c:"Exporter puis lire",d:"Visualiser puis importer"},a:"b"},
{id:17,q:"Quel message d'erreur est préférable ?",c:{a:"Erreur",b:"KO",c:"donnée invalide: montant négatif ligne 12",d:"None"},a:"c"},
{id:18,q:"Quel mot-clé protège un point d'entrée de script ?",c:{a:"class",b:"lambda",c:"__name__ == '__main__'",d:"yield"},a:"c"},
{id:19,q:"Le niveau 1 couvre les bibliothèques data avancées ?",c:{a:"Oui en profondeur",b:"Uniquement une partie",c:"Non, traité au niveau avancé",d:"Seulement en option"},a:"c"},
{id:20,q:"Livrable attendu en fin de niveau 1 :",c:{a:"Un pipeline distribué",b:"Un mini-projet Python pur lisible et exécutable",c:"Un moteur ML",d:"Une API asynchrone"},a:"b"}
];
function render(){
  document.getElementById('quiz').innerHTML = Q.map(x =>
    `<div class='question' id='q${x.id}'><p><strong>${x.id}. ${x.q}</strong></p>${Object.entries(x.c).map(([k,v]) =>
    `<label class='choice'><input type='radio' name='q${x.id}' value='${k}'> ${k}) ${v}</label>`).join('')}</div>`
  ).join('');
}
function grade(){
  let s=0;
  Q.forEach(x=>{
    const el=document.getElementById('q'+x.id);
    const ch=document.querySelector(`input[name="q${x.id}"]:checked`);
    if(ch && ch.value===x.a){s++;el.classList.add('correct')}else{el.classList.add('wrong')}
    el.querySelectorAll('input').forEach(i=>i.disabled=true);
  });
  const r=document.getElementById('res');
  r.style.display='block';
  r.innerHTML=`<h2>Score: ${s}/20</h2>`;
  document.getElementById('btn').disabled=true;
}
render();
</script>
</body>
</html>
