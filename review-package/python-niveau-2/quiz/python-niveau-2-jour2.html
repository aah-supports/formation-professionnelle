<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Python Niveau II - Jour 2</title>
<style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f6fa;color:#2d3436;margin:0;padding:0 0 40px}
.container{max-width:820px;margin:0 auto;padding:20px}.question{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:14px;border-left:4px solid #74b9ff}
.question.correct{border-left-color:#00b894}.question.wrong{border-left-color:#d63031}.q{font-weight:600;margin-bottom:10px}
.choice{display:block;margin:6px 0}.actions{text-align:center;margin:24px 0}button{background:#0984e3;color:#fff;border:none;padding:12px 22px;border-radius:8px;cursor:pointer}
#results{display:none;background:#fff;padding:20px;border-radius:10px}.ok{color:#00b894}.ko{color:#d63031}
a{color:#0984e3;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <p><a href="index.html">&larr; Retour quiz Python Niveau II</a></p>
  <h1>Quiz Python Niveau II - Jour 2</h1>
  <p>Coroutine, async/await et orchestration. 10 questions - repere >= 6/10.</p>
  <div id="quiz"></div>
  <div class="actions"><button id="submit" onclick="grade()">Valider</button></div>
  <div id="results"></div>
</div>
<script>
const QUESTIONS=[
{id:1,q:"Une fonction definie avec async def retourne :",c:{a:"Un thread",b:"Un coroutine object",c:"Un tuple",d:"Toujours None"},a:"b"},
{id:2,q:"Le mot-cle await sert a :",c:{a:"Attendre le resultat d'une coroutine/awaitable",b:"Importer asyncio",c:"Creer une classe",d:"Bloquer le GIL"},a:"a"},
{id:3,q:"asyncio.gather(...) permet de :",c:{a:"Compiler plusieurs modules",b:"Executer plusieurs coroutines en concurrence",c:"Remplacer for",d:"Demarrer un process"},a:"b"},
{id:4,q:"asyncio.create_task(coro) sert a :",c:{a:"Planifier une coroutine en tache",b:"Annuler l'event loop",c:"Creer une classe",d:"Ecrire un fichier"},a:"a"},
{id:5,q:"Pourquoi utiliser await asyncio.sleep(1) plutot que time.sleep(1) en async ?",c:{a:"Moins de RAM",b:"Pour ne pas bloquer l'event loop",c:"Pour accelerer le CPU",d:"Aucune difference"},a:"b"},
{id:6,q:"Pour une charge CPU-bound lourde, la strategie la plus adaptee est souvent :",c:{a:"asyncio uniquement",b:"multiprocessing",c:"sleep",d:"decorateur property"},a:"b"},
{id:7,q:"Quel outil applique un timeout a une coroutine ?",c:{a:"asyncio.wait_for",b:"asyncio.wraps",c:"asyncio.timeout_loop",d:"asyncio.join"},a:"a"},
{id:8,q:"Quand une tache async est annulee, quelle exception est typiquement levee ?",c:{a:"KeyError",b:"CancelledError",c:"TypeError",d:"TimeoutWarning"},a:"b"},
{id:9,q:"Un asyncio.Semaphore sert a :",c:{a:"Limiter le nombre de taches concurrentes",b:"Fusionner des DataFrames",c:"Creer des classes immuables",d:"Mesurer le CPU"},a:"a"},
{id:10,q:"L'approche async est surtout rentable quand :",c:{a:"Le code attend beaucoup d'I/O",b:"Tout est calcul pur",c:"Il n'y a qu'une requete",d:"On evite les fonctions"},a:"a"}
];
function render(){const root=document.getElementById('quiz');root.innerHTML=QUESTIONS.map(x=>`<div class="question" id="q${x.id}"><div class="q">${x.id}. ${x.q}</div>${Object.entries(x.c).map(([k,v])=>`<label class="choice"><input type="radio" name="q${x.id}" value="${k}"> ${k}) ${v}</label>`).join('')}</div>`).join('');}
function grade(){let s=0;QUESTIONS.forEach(x=>{const el=document.getElementById('q'+x.id);const checked=document.querySelector(`input[name="q${x.id}"]:checked`);if(checked&&checked.value===x.a){s++;el.classList.add('correct');}else{el.classList.add('wrong');}el.querySelectorAll('input').forEach(i=>i.disabled=true);});const pass=s>=6;const r=document.getElementById('results');r.style.display='block';r.innerHTML=`<h2>Score: ${s}/10</h2><p class="${pass?'ok':'ko'}">${pass?'Positionnement favorable':'A renforcer'}</p>`;document.getElementById('submit').disabled=true;}
render();
</script>
</body>
</html>
