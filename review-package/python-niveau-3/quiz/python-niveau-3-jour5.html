<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Python Niveau III - Jour 5</title>
<style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f6fa;color:#2d3436;margin:0;padding:0 0 40px}.container{max-width:820px;margin:0 auto;padding:20px}.question{background:#fff;border-radius:10px;padding:16px 18px;margin-bottom:12px;border-left:4px solid #e17055}.question.correct{border-left-color:#00b894}.question.wrong{border-left-color:#d63031}.choice{display:block;margin:6px 0}button{background:#0984e3;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer}#res{display:none;background:#fff;padding:16px;border-radius:10px;margin-top:16px}</style>
</head>
<body>
<div class="container">
<p><a href="index.html">&larr; Retour quiz Python Niveau III</a></p>
<h1>Quiz Python Niveau III - Jour 5</h1>
<div id="quiz"></div>
<button id="btn" onclick="grade()">Valider</button>
<div id="res"></div>
</div>
<script>
const Q=[
{id:1,q:"cProfile sert a :",c:{a:"Mesurer ou le temps CPU est consomme",b:"Compresser les fichiers",c:"Generer une API",d:"Creer des types"},a:"a"},
{id:2,q:"Un cache est utile surtout quand :",c:{a:"Le calcul/requete est repetitif",b:"Le code est deja instantane",c:"On ecrit des tests",d:"On fait un merge git"},a:"a"},
{id:3,q:"Pour des calculs CPU lourds, on privilegie souvent :",c:{a:"multiprocessing",b:"await sleep",c:"decorateurs",d:"JSON logs"},a:"a"},
{id:4,q:"CI signifie :",c:{a:"Continuous Integration",b:"Code Inspection",c:"Compile Instance",d:"Cache Inference"},a:"a"},
{id:5,q:"Observabilite implique au minimum :",c:{a:"logs, metriques, traces",b:"README uniquement",c:"aucun monitoring",d:"juste prints"},a:"a"}
];
function render(){document.getElementById('quiz').innerHTML=Q.map(x=>`<div class='question' id='q${x.id}'><p><strong>${x.id}. ${x.q}</strong></p>${Object.entries(x.c).map(([k,v])=>`<label class='choice'><input type='radio' name='q${x.id}' value='${k}'> ${k}) ${v}</label>`).join('')}</div>`).join('');}
function grade(){let s=0;Q.forEach(x=>{const el=document.getElementById('q'+x.id);const ch=document.querySelector(`input[name="q${x.id}"]:checked`);if(ch&&ch.value===x.a){s++;el.classList.add('correct')}else{el.classList.add('wrong')}el.querySelectorAll('input').forEach(i=>i.disabled=true)});const r=document.getElementById('res');r.style.display='block';r.innerHTML=`<h2>Score: ${s}/5</h2>`;document.getElementById('btn').disabled=true;}
render();
</script>
</body>
</html>
